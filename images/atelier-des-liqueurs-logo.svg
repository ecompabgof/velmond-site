    <circle cx="126" cy="80" r="2" fill="#9C2A3A" stroke="none" opacity="0.4"/>
    <circle cx="280" cy="85" r="3" fill="#9C2A3A" stroke="none" opacity="0.4"/>
    <circle cx="274" cy="80" r="2" fill="#9C2A3A" stroke="none" opacity="0.4"/>
