  <!-- Number 27 -->
  <text x="200" y="210" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="72" font-weight="400" font-style="italic" letter-spacing="4" fill="#1E1C1A">27</text>

  <!-- BOTANICA text -->
  <text x="200" y="268" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="42" font-weight="400" font-style="italic" letter-spacing="8" fill="#1E1C1A">BOTANICA</text>
