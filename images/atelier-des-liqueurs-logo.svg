  <!-- L'ATELIER text -->
  <text x="200" y="248" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="36" font-weight="400" letter-spacing="6" fill="#1E1C1A">L'ATELIER</text>

  <!-- DES LIQUEURS text -->
  <text x="200" y="300" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="42" font-weight="700" letter-spacing="4" fill="#1E1C1A">DES LIQUEURS</text>
