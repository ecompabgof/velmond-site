    <path d="M240 40 C244 38, 250 42, 248 48 L218 98 C216 102, 212 104, 208 100 L238 50"/>

    <!-- Mortar bowl -->
    <path d="M135 95 C130 95, 125 100, 125 108 L132 148 C135 162, 148 172, 168 176 L232 176 C252 172, 265 162, 268 148 L275 108 C275 100, 270 95, 265 95"/>

