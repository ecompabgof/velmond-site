    <circle cx="193" cy="42" r="2.5" fill="#4B6F4E" stroke="none"/>
    <circle cx="207" cy="42" r="2.5" fill="#4B6F4E" stroke="none"/>
    <circle cx="200" cy="46" r="2" fill="#4B6F4E" stroke="none"/>
